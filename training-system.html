      {id:9,name:"圆与扇形",phase:"阶段三：几何进阶",startWeek:6,endWeek:6,color:"#d97a5c",completed:false,sortOrder:9,topics:["圆周长","圆面积","扇形弧长","扇形面积","圆环面积"],plans:"Day 1-2：圆的周长和面积（15题）\nDay 3-4：扇形弧长和面积（15题）\nDay 5：圆环与组合图形（10题）\nDay 6-7：综合练习"},
      {id:10,name:"多次相遇行程问题",phase:"阶段四：应用题专题",startWeek:7,endWeek:7,color:"#8b7ab8",completed:false,sortOrder:10,topics:["直线多次相遇","环形跑道","速度比","份数法"],plans:"Day 1-2：理解多次相遇规律（10题）\nDay 3-4：直线多次相遇综合（15题）\nDay 5：环形跑道（10题）\nDay 6：速度比与份数法（10题）\nDay 7：综合练习"},
      {id:11,name:"水中浸物",phase:"阶段四：应用题专题",startWeek:8,endWeek:8,color:"#a89cd4",completed:false,sortOrder:11,topics:["完全浸没","不完全浸没","水溢出","水位变化"],plans:"Day 1-2：完全浸没与不完全浸没（15题）\nDay 3：水溢出判断（10题）\nDay 4-5：综合练习（15题）\nDay 6-7：错题复盘"},
      {id:12,name:"分类枚举",phase:"阶段四：应用题专题",startWeek:8,endWeek:8,color:"#c4b8e0",completed:false,sortOrder:12,topics:["有序枚举","分类标准","树形图","加法原理"],plans:"Day 1-2：有序枚举练习（15题）\nDay 3-4：树形图与分类枚举（15题）\nDay 5-7：综合练习"},
      {id:13,name:"染色与覆盖",phase:"阶段四：应用题专题",startWeek:8,endWeek:8,color:"#ddd5ec",completed:false,sortOrder:13,topics:["染色法","奇偶性分析","覆盖问题","逻辑推理"],plans:"Day 1-2：染色法基本概念（10题）\nDay 3-4：覆盖问题（10题）\nDay 5-7：综合练习"}
    ];

    let modules = [];
    let currentWeek = 1;
    let ganttChart = null;
    const colors = ["#3d7a6e","#5a9e8e","#7ab8aa","#9dd2c6","#d4a04a","#c9a227","#b85c3e","#c75b39","#d97a5c","#8b7ab8","#a89cd4","#c4b8e0","#ddd5ec"];

    async function init() {
      setSyncStatus('正在从 Supabase 加载数据...', false);
      await loadModules();
      refreshAllViews();
      initGantt();
      populateWeekSelects();
      renderColorPicker();
    }

    async function loadModules() {
      const rows = await sbFetch('GET', '?select=*&order=sort_order.asc', undefined);
      if (rows && Array.isArray(rows) && rows.length > 0) {
        modules = rows.map(fromRow);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(modules));
        setSyncStatus('已从 Supabase 同步 (' + modules.length + ' 模块)', false);
        return;
      }
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        modules = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(defaultModules));
      } catch (e) { modules = JSON.parse(JSON.stringify(defaultModules)); }
      if (rows === null) { setSyncStatus('Supabase 无法连接，使用本地数据', true); }
      else {
        for (const m of modules) await sbFetch('POST', '', toRow(m));
        setSyncStatus('初始数据已同步到 Supabase', false);
      }
    }

    function refreshAllViews() { renderStats(); renderModuleGrid(); renderCalendar(); if (ganttChart) updateGantt(); }

    async function saveModuleToDb(m) {
      const row = toRow(m);
      if (m.dbId) {
        const r = await sbFetch('PATCH', '?id=eq.' + m.dbId, row);
        if (r) setSyncStatus('已同步到 Supabase', false);
      } else {
        const r = await sbFetch('POST', '', row);
        if (r && Array.isArray(r) && r[0]) { m.dbId = r[0].id; m.id = r[0].id; setSyncStatus('已同步到 Supabase', false); }
      }
    }

    async function deleteFromDb(m) {
      if (m.dbId) { await sbFetch('DELETE', '?id=eq.' + m.dbId, undefined); setSyncStatus('已从 Supabase 删除', false); }
    }

    function renderStats() {
      document.getElementById('stat-total').textContent = modules.length;
      document.getElementById('stat-weeks').textContent = modules.length > 0 ? Math.max(...modules.map(m=>m.endWeek)) : 0;
      document.getElementById('stat-progress').textContent = modules.filter(m=>m.completed).length + '/' + modules.length;
      const cp = modules.find(m=>!m.completed);
      document.getElementById('stat-phase').textContent = cp ? cp.phase.replace(/阶段[一二三四]：/, '') : '已完成';
    }

    function switchView(v) {
      document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
      document.getElementById('view-'+v).classList.add('active');
      document.querySelector('.nav-item[data-view="'+v+'"]').classList.add('active');
      if (v==='gantt') setTimeout(()=>{if(ganttChart)ganttChart.resize();},100);
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function renderModuleGrid() {
      document.getElementById('module-grid').innerHTML = modules.map(m=>`
        <div class="module-card" onclick="editModule(${m.id})">
          <div style="position:absolute;left:0;top:1rem;bottom:1rem;width:4px;border-radius:0 4px 4px 0;background:${m.color}"></div>
          <div class="module-header">
            <div class="module-title">${m.name}</div>
            <div class="module-week">第${m.startWeek}${m.startWeek!==m.endWeek?'-'+m.endWeek:''}周</div>
          </div>
          <div class="module-phase">${m.phase}</div>
          <div class="module-topics">${m.topics.map(t=>'<span class="module-topic">'+t+'</span>').join('')}</div>
          <div class="module-actions" onclick="event.stopPropagation()">
            <button class="btn btn-secondary btn-small" onclick="editModule(${m.id})">编辑</button>
            <button class="btn btn-secondary btn-small" onclick="toggleComplete(${m.id})">${m.completed?'取消完成':'标记完成'}</button>
            <button class="btn btn-secondary btn-small" onclick="deleteModule(${m.id})" style="color:var(--accent)">删除</button>
          </div>
        </div>`).join('');
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      const days = ['周一','周二','周三','周四','周五','周六','周日'];
      let html = '<div class="calendar-cell header"></div>';
      days.forEach(d=>html+='<div class="calendar-cell header">'+d+'</div>');
      for (let w=1;w<=8;w++) {
        html+='<div class="calendar-cell time-label '+(w===currentWeek?'today':'')+'">第'+w+'周</div>';
        for (let d=0;d<7;d++) {
          const tasks = modules.filter(m=>m.startWeek<=w&&m.endWeek>=w);
          const dt = getDateForDay(w,d);
          html+='<div class="calendar-cell '+(w===currentWeek?'today':'')+'"><div class="calendar-date">'+dt+'</div>';
          tasks.forEach(t=>{ html+='<div class="calendar-task" style="background:'+t.color+'22;color:'+t.color+';border-left:3px solid '+t.color+'" onclick="editModule('+t.id+')">'+t.name+'</div>'; });
          html+='</div>';
        }
      }
      grid.innerHTML = html;
    }

    function getDateForDay(week, day) {
      const s = new Date(2026,6,6);
      const d = new Date(s.getTime()+((week-1)*7+day)*86400000);
      return (d.getMonth()+1)+'/'+d.getDate();
    }

    function changeWeek(dir) { currentWeek=Math.max(1,Math.min(8,currentWeek+dir)); renderCalendar(); }

    function initGantt() {
      ganttChart = echarts.init(document.getElementById('gantt-chart'), null, {renderer:'svg'});
      updateGantt();
      window.addEventListener('resize', ()=>ganttChart&&ganttChart.resize());
    }

    function updateGantt() {
      if (!ganttChart) return;
      const phases = [...new Set(modules.map(m=>m.phase))];
      const data = modules.map(m=>({name:m.name,value:[phases.indexOf(m.phase),m.startWeek-1,m.endWeek],itemStyle:{color:m.color},id:m.id}));
      function renderItem(p, api) {
        const ci=api.value(0),s=api.coord([api.value(1),ci]),e=api.coord([api.value(2),ci]),h=api.size([0,1])[1]*0.55;
        const r=echarts.graphic.clipRectByRect({x:s[0],y:s[1]-h/2,width:e[0]-s[0],height:h},{x:p.coordSys.x,y:p.coordSys.y,width:p.coordSys.width,height:p.coordSys.height});
        return r&&{type:'rect',transition:['shape'],shape:r,style:api.style()};
      }
      ganttChart.setOption({
        animation:false,
        tooltip:{trigger:'item',appendToBody:true,formatter:p=>'<strong>'+p.data.name+'</strong><br/>第'+(p.data.value[1]+1)+'周 ~ 第'+p.data.value[2]+'周'},
        grid:{top:40,bottom:30,left:150,right:30},
        xAxis:{type:'value',min:0,max:8,interval:1,axisLabel:{formatter:v=>v===0?'开始':'第'+v+'周',color:'#8c8279',fontSize:12},splitLine:{lineStyle:{color:'#d9d0c5',type:'dashed'}},axisLine:{lineStyle:{color:'#d9d0c5'}},axisTick:{show:false}},
        yAxis:{type:'category',data:phases,axisLabel:{color:'#2d2a26',fontSize:12,fontWeight:500},axisLine:{show:false},axisTick:{show:false},splitLine:{show:false}},
        series:[{type:'custom',renderItem:renderItem,itemStyle:{opacity:0.9,borderRadius:4},label:{show:true,position:'inside',formatter:p=>p.data.value[2]-p.data.value[1]>=1?p.data.name:'',color:'#fff',fontSize:11,fontWeight:500},encode:{x:[1,2],y:0},data:data}]
      });
      ganttChart.off('click');
      ganttChart.on('click',p=>{if(p.data&&p.data.id)editModule(p.data.id);});
    }

    function populateWeekSelects() {
      let o=''; for(let i=1;i<=8;i++) o+='<option value="'+i+'">第'+i+'周</option>';
      document.getElementById('edit-start').innerHTML=o;
      document.getElementById('edit-end').innerHTML=o;
    }

    function renderColorPicker() {
      document.getElementById('color-picker').innerHTML = colors.map(c=>'<div class="color-option" style="background:'+c+'" data-color="'+c+'" onclick="selectColor(this)"></div>').join('');
    }

    function selectColor(el) { document.querySelectorAll('.color-option').forEach(o=>o.classList.remove('selected')); el.classList.add('selected'); }

    function editModule(id) {
      const m = modules.find(x=>x.id===id); if(!m) return;
      document.getElementById('edit-id').value=m.id;
      document.getElementById('edit-name').value=m.name;
      document.getElementById('edit-start').value=m.startWeek;
      document.getElementById('edit-end').value=m.endWeek;
      document.getElementById('edit-phase').value=m.phase;
      document.getElementById('edit-topics').value=m.topics.join('\n');
      document.getElementById('edit-plans').value=m.plans||'';
      document.getElementById('edit-completed').checked=m.completed;
      document.querySelectorAll('.color-option').forEach(o=>o.classList.toggle('selected',o.dataset.color===m.color));
      document.getElementById('modal-title').textContent='编辑模块';
      document.getElementById('modal').classList.add('active');
    }

    function addModule() {
      document.getElementById('edit-id').value='';
      document.getElementById('edit-name').value='';
      document.getElementById('edit-start').value='1';
      document.getElementById('edit-end').value='1';
      document.getElementById('edit-phase').value='阶段一：数与运算';
      document.getElementById('edit-topics').value='';
      document.getElementById('edit-plans').value='';
      document.getElementById('edit-completed').checked=false;
      document.querySelectorAll('.color-option').forEach(o=>o.classList.remove('selected'));
      document.getElementById('modal-title').textContent='新增模块';
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); }

    async function saveModule() {
      const id=document.getElementById('edit-id').value;
      const name=document.getElementById('edit-name').value.trim();
      const startWeek=parseInt(document.getElementById('edit-start').value);
      const endWeek=parseInt(document.getElementById('edit-end').value);
      const phase=document.getElementById('edit-phase').value;
      const topics=document.getElementById('edit-topics').value.split('\n').map(t=>t.trim()).filter(t=>t);
      const plans=document.getElementById('edit-plans').value;
      const completed=document.getElementById('edit-completed').checked;
      const sel=document.querySelector('.color-option.selected');
      const color=sel?sel.dataset.color:colors[modules.length%colors.length];
      if(!name){alert('请输入模块名称');return;}
      if(startWeek>endWeek){alert('开始周不能晚于结束周');return;}
      if(id){
        const m=modules.find(x=>x.id===parseInt(id));
        if(m){m.name=name;m.startWeek=startWeek;m.endWeek=endWeek;m.phase=phase;m.topics=topics;m.plans=plans;m.completed=completed;m.color=color;setSyncStatus('正在保存...',false);await saveModuleToDb(m);}
      } else {
        const nm={id:Date.now(),dbId:null,name,startWeek,endWeek,phase,topics,plans,completed,color,sortOrder:modules.length+1};
        setSyncStatus('正在保存...',false);await saveModuleToDb(nm);
        if(nm.dbId)nm.id=nm.dbId;modules.push(nm);
      }
      localStorage.setItem(STORAGE_KEY,JSON.stringify(modules));
      refreshAllViews();closeModal();
    }

    async function toggleComplete(id) {
      const m=modules.find(x=>x.id===id);
      if(m){m.completed=!m.completed;localStorage.setItem(STORAGE_KEY,JSON.stringify(modules));await saveModuleToDb(m);refreshAllViews();}
    }

    async function deleteModule(id) {
      if(confirm('确定删除这个模块吗？')){
        const m=modules.find(x=>x.id===id);if(m)await deleteFromDb(m);
        modules=modules.filter(m=>m.id!==id);localStorage.setItem(STORAGE_KEY,JSON.stringify(modules));refreshAllViews();
      }
    }

    document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
    init();
  </script>
</body>
</html>
