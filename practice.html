      {q: "接上题，只参加一个组的有几人？", a: "只A：$20-8-7+3=8$；只B：$18-8-6+3=7$；只C：$16-7-6+3=6$。只参加一个组 $=8+7+6=21$ 人。"},
      {q: "某班50人，语文优秀25人，数学优秀20人，英语优秀22人；语数都优秀10人，语英都优秀8人，数英都优秀9人；三科都优秀5人。三科都不优秀的有几人？", a: "至少一科优秀 $=25+20+22-10-8-9+5=45$ 人。都不优秀 $=50-45=5$ 人。"},
      {q: "求1到200中能被4或6或9整除的数的个数。", a: "被4整除50个，被6整除33个，被9整除22个；被12整除16个，被36整除5个，被18整除11个；被36整除5个。$50+33+22-16-11-5+5=78$ 个。"},
      {q: "在1到100中，能被2整除但不能被3整除的数有几个？", a: "被2整除50个，被6整除16个。能被2但不能被3 $=50-16=34$ 个。"},
      {q: "某校调查100名学生，喜欢音乐58人，喜欢体育52人，喜欢美术46人；喜欢音体32人，喜欢音美28人，喜欢体美24人；三项都喜欢15人。三项都不喜欢的有几人？", a: "$58+52+46-32-28-24+15=87$。都不喜欢 $=100-87=13$ 人。"}
    ]
  }
];

let currentTopic = 0;
let allRevealed = false;

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = topics.map((t, i) => `
    <div class="topic-item ${i===currentTopic?'active':''}" onclick="switchTopic(${i})">
      <span class="topic-num">${i+1}</span>${t.name}
    </div>
  `).join('');
}

function renderQuestions() {
  const main = document.getElementById('main');
  const t = topics[currentTopic];
  main.innerHTML = `
    <div class="topic-title">${t.name} <span class="badge">10道题</span></div>
    <div class="topic-desc">${t.desc}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${((currentTopic+1)/topics.length*100).toFixed(0)}%"></div></div>
    <div class="question-list">
      ${t.questions.map((q, i) => `
        <div class="q-card">
          <div class="q-header">
            <div class="q-text"><span class="q-num">${i+1}</span>${q.q}</div>
            <button class="q-toggle" id="btn-${currentTopic}-${i}" onclick="toggleAnswer(${currentTopic},${i})">显示答案</button>
          </div>
          <div class="q-answer" id="ans-${currentTopic}-${i}">
            <div class="q-answer-label">解答</div>
            <div class="q-answer-text">${q.a}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  if (allRevealed) {
    t.questions.forEach((_, i) => {
      const ans = document.getElementById(`ans-${currentTopic}-${i}`);
      const btn = document.getElementById(`btn-${currentTopic}-${i}`);
      if (ans) { ans.classList.add('show'); }
      if (btn) { btn.textContent = '隐藏答案'; btn.classList.add('reveal'); }
    });
  }
  if (typeof renderMathInElement !== 'undefined') {
    renderMathInElement(document.getElementById('main'), {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ],
      throwOnError: false
    });
  }
}

function switchTopic(i) {
  currentTopic = i;
  renderSidebar();
  renderQuestions();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleAnswer(ti, qi) {
  const ans = document.getElementById(`ans-${ti}-${qi}`);
  const btn = document.getElementById(`btn-${ti}-${qi}`);
  if (ans.classList.contains('show')) {
    ans.classList.remove('show');
    btn.textContent = '显示答案';
    btn.classList.remove('reveal');
  } else {
    ans.classList.add('show');
    btn.textContent = '隐藏答案';
    btn.classList.add('reveal');
  }
}

function toggleAllAnswers() {
  allRevealed = !allRevealed;
  const btn = document.getElementById('globalToggle');
  if (allRevealed) {
    btn.innerHTML = '&#128065; 隐藏全部答案';
    topics[currentTopic].questions.forEach((_, i) => {
      const ans = document.getElementById(`ans-${currentTopic}-${i}`);
      const b = document.getElementById(`btn-${currentTopic}-${i}`);
      if (ans) { ans.classList.add('show'); }
      if (b) { b.textContent = '隐藏答案'; b.classList.add('reveal'); }
    });
  } else {
    btn.innerHTML = '&#128065; 显示全部答案';
    topics[currentTopic].questions.forEach((_, i) => {
      const ans = document.getElementById(`ans-${currentTopic}-${i}`);
      const b = document.getElementById(`btn-${currentTopic}-${i}`);
      if (ans) { ans.classList.remove('show'); }
      if (b) { b.textContent = '显示答案'; b.classList.remove('reveal'); }
    });
  }
}

renderSidebar();
renderQuestions();
</script>
